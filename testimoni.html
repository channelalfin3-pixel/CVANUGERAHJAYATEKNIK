<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimoni | CV Anugerah Jaya Teknik</title>
<meta name="description" content="Testimoni klien CV Anugerah Jaya Teknik dari berbagai sektor: pabrik, rumah sakit, hotel, mall, dan perkantoran.">
<link rel="canonical" href="https://anugerahjayateknik.co.id/testimoni.html">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23071A30%22/><text x=%2250%22 y=%2265%22 font-size=%2244%22 fill=%22%23F4770B%22 text-anchor=%22middle%22 font-family=%22monospace%22 font-weight=%22bold%22>AJT</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="loader"><div class="loader-mark">AJT</div></div>
<div id="site-header"></div>

<header class="page-header">
  <div class="container-ajt">
    <nav class="breadcrumb-ajt"><a href="index.html">Home</a> / Testimoni</nav>
    <h1>Apa Kata Klien Kami</h1>
  </div>
</header>

<section class="section">
  <div class="container-ajt">
    <div class="row g-4" id="testiGrid"></div>
  </div>
</section>

<div id="site-footer"></div>
<div id="site-floating"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/main.js"></script>
<script>
  AJT_TESTI = {};
  fetch('assets/data/testimonials.json').then(r=>r.json()).then(data=>{
    const grid = document.getElementById('testiGrid');
    grid.innerHTML = data.map(t => `
      <div class="col-md-6 col-lg-4">
        <div class="card-ajt testi-card h-100" data-aos="fade-up">
          <img src="${t.foto}" class="testi-avatar" alt="${t.nama}" loading="lazy">
          <div class="stars">${'<i class="fa-solid fa-star"></i>'.repeat(t.rating)}${'<i class="fa-regular fa-star"></i>'.repeat(5-t.rating)}</div>
          <p class="fst-italic text-secondary mb-3">&ldquo;${t.komentar}&rdquo;</p>
          <h6 class="fw-semibold mb-0">${t.nama}</h6>
          <p class="small text-mono text-orange">${t.perusahaan}</p>
        </div>
      </div>`).join('');
  });
</script>
</body>
</html>
